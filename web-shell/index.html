<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companion Web Shell — 主动对话调试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;display:flex;height:100vh;background:#f5f7fa}
/* ── chat panel ── */
#chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
#chat-header{background:#2E3A59;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
#chat-header h1{font-size:18px;flex:1}
#chat-header select{background:#4F46E5;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:13px}
#api-key-area{background:#fff3cd;padding:6px 12px;display:flex;gap:8px;align-items:center;font-size:13px}
#api-key-area input{flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px}
#api-key-area button{background:#4F46E5;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:13px}
#messages{flex:1;overflow-y:auto;padding:12px}
#messages .msg{display:flex;margin-bottom:8px}
#messages .msg.user{justify-content:flex-end}
#messages .msg.assistant{justify-content:flex-start}
#messages .msg.proactive{justify-content:flex-start}
#messages .bubble{max-width:75%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5}
#messages .user .bubble{background:#4F46E5;color:#fff}
#messages .assistant .bubble{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.1)}
#messages .proactive .bubble{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D}
#messages .meta{font-size:10px;opacity:.6;margin-top:4px}
#input-area{display:flex;padding:8px 12px;background:#fff;gap:8px;border-top:1px solid #e5e7eb}
#input-area input{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
#input-area button{background:#4F46E5;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}

/* ── debug panel ── */
#debug-panel{width:380px;background:#1e1e2e;color:#cdd6f4;display:flex;flex-direction:column;overflow-y:auto;font-size:12px;font-family:monospace}
#debug-panel h2{font-size:14px;padding:12px 14px;background:#313244;color:#f5c2e7;margin:0}
.section{padding:8px 14px;border-bottom:1px solid #313244}
.section h3{font-size:12px;color:#89b4fa;margin-bottom:4px}
.section .val{color:#a6e3a1}
.section .warn{color:#fab387}
.section .err{color:#f38ba8}
.section .dim{color:#6c7086}
#log-area{flex:1;overflow-y:auto;padding:8px 14px}
#log-area .log{margin-bottom:2px}
#log-area .log.info{color:#a6adc8}
#log-area .log.event{color:#f9e2af}
#log-area .log.decision{color:#89b4fa}
#log-area .log.api{color:#a6e3a1}
#log-area .log.error{color:#f38ba8}
</style>
</head>
<body>

<!-- ═══════════ CHAT PANEL ═══════════ -->
<div id="chat-panel">
  <div id="chat-header">
    <h1>Companion Web Shell</h1>
    <select id="contact-select">
      <option value="default">Companion</option>
      <option value="test">🧪 主动消息测试 (1分钟)</option>
    </select>
    <span style="font-size:12px;margin-left:8px">模式:</span>
    <select id="mode-toggle" onchange="onModeToggle()">
      <option value="PRESENT">PRESENT (强互动)</option>
      <option value="ABSENT">ABSENT (弱互动)</option>
    </select>
  </div>
  <div id="api-key-area">
    <span>🔑 DeepSeek API Key:</span>
    <input id="api-key" type="password" placeholder="sk-...">
    <button onclick="saveApiKey()">保存</button>
    <span style="font-size:11px;color:#856404">API: server.py 自动转发 → api.deepseek.com</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">发送</button>
  </div>
</div>

<!-- ═══════════ DEBUG PANEL ═══════════ -->
<div id="debug-panel">
  <h2>🔍 调试面板</h2>
  <div class="section" id="state-life"></div>
  <div class="section" id="state-emotion"></div>
  <div class="section" id="state-persona"></div>
  <div class="section" id="state-scheduler"></div>
  <div class="section">
    <h3>🧠 记忆</h3>
    <div id="memory-display" class="dim" style="white-space:pre-wrap;max-height:120px;overflow-y:auto">(暂无记忆)</div>
  </div>
  <div id="log-area"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DEEPSEEK CLIENT
// ═══════════════════════════════════════════════════════════════
const PROXY = ''; // same-origin — server.py handles both pages + API proxy
const DS = {
  async complete(messages, opts = {}) {
    const body = {
      model: 'deepseek-v4-pro',
      messages,
      stream: false,
      max_tokens: opts.maxTokens || 1024,
    };
    if (opts.reasoning) {
      body.thinking = { type: 'enabled' };
      body.reasoning_effort = opts.reasoning;
    }
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey) throw new Error('请先设置 API Key');
    log('api', `→ POST /chat/completions (${opts.label || ''})`);
    const resp = await fetch(PROXY + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const json = await resp.json();
    return json.choices[0].message.content;
  },
};

// ═══════════════════════════════════════════════════════════════
// ENGINE TYPES (mirrors Java classes)
// ═══════════════════════════════════════════════════════════════
class EmotionalProfile {
  constructor(v, a, d, themes) {
    this.valence = v; this.arousal = a; this.dominance = d; this.keyThemes = themes || [];
    this.timestamp = Date.now();
  }
  isNegative() { return this.valence < -0.2; }
  isHighlyAroused() { return this.arousal > 0.7; }
  static neutral() { return new EmotionalProfile(0, 0.5, 0.5, []); }
}

class LifeEngineEvent {
  constructor(reason, confidence, hint, idleMin, userMsgSignal) {
    this.reason = reason; this.confidence = confidence;
    this.contextHint = hint; this.idleMinutes = idleMin;
    this.userMsgSignal = userMsgSignal || null; // { intensity, depth, needCare }
  }
}

class EmotionEngineEvent {
  constructor(reason, snapshot, urgency) {
    this.reason = reason; this.snapshot = snapshot; this.urgency = urgency;
  }
}

class TriggerDecision {
  constructor(speak, hint, conf) {
    this.shouldSpeak = speak; this.topicHint = hint; this.confidence = conf;
  }
  static noAction() { return new TriggerDecision(false, null, 0); }
}

// ═══════════════════════════════════════════════════════════════
// LIFE ENGINE — "Companion 的周围世界"
// ═══════════════════════════════════════════════════════════════
const LifeEngine = {
  state: 'IDLE',            // IDLE | OBSERVING | READY
  interactionMode: 'PRESENT', // PRESENT | ABSENT
  lastInteraction: Date.now(),
  lastProactiveSent: 0,     // timestamp of last proactive message Companion sent
  consecutiveNoReply: 0,    // how many proactive messages without user reply
  interactionCount: 0,
  idleThresholdMs: 2 * 60 * 60 * 1000,
  activeHours: new Set(),
  histAvg: 10,
  lastUserMsgSignal: null,  // { intensity, depth, needCare }

  reset() {
    this.state = 'IDLE';
    this.interactionMode = 'PRESENT';
    this.lastInteraction = Date.now();
    this.lastProactiveSent = 0;
    this.consecutiveNoReply = 0;
    this.interactionCount = 0;
    this.activeHours.clear();
    this.histAvg = 10;
    this.lastUserMsgSignal = null;
  },

  // ── drive source 1: time ──

  onTimerTick(now) {
    if (this.state === 'READY') return;
    const idleMs = now - this.lastInteraction;
    const inWindow = this.activeHours.size === 0 || this.activeHours.has(new Date(now).getHours());
    const morning = new Date(now).getHours() >= 10 && this.interactionCount === 0;
    const initial = this.interactionCount === 0 && idleMs > this.idleThresholdMs;

    if (morning) {
      this.state = 'READY';
    } else if (initial) {
      this.state = 'READY';
    } else if (idleMs > this.idleThresholdMs && inWindow) {
      this.state = 'READY';
    }
  },

  // ── drive source 2: user message ──

  onUserMessage(ts, msgText) {
    this.lastInteraction = ts;
    this.interactionCount++;
    this.histAvg = Math.round((this.histAvg * 4 + this.interactionCount) / 5);
    this.activeHours.add(new Date(ts).getHours());
    this.consecutiveNoReply = 0; // user replied → reset
    if (this.state === 'IDLE') this.state = 'OBSERVING';
    else if (this.state === 'READY') this.state = 'OBSERVING';

    // Analyze message content (keyword-based, no LLM needed for this layer)
    if (msgText) {
      this.lastUserMsgSignal = this._analyzeMessage(msgText);
    }
  },

  _analyzeMessage(text) {
    const needCareWords = ['累', '难', '烦', '焦虑', '压力', '不开心', '难过', '崩溃', '失眠', '害怕', '孤独', '担心', '不舒服', '生病', '失败', '被拒', '分手', '迷茫', '空虚'];
    const intensityWords = ['太', '非常', '很', '特别', '急', '快', '一直', '总是', '真的', '超级', '好', '极'];
    const questionWords = ['?', '？', '吗', '呢', '吧', '怎么', '什么', '能不能', '要不要', '可以吗'];

    let needCare = 0, intensity = 0;
    for (const w of needCareWords) { if (text.includes(w)) needCare++; }
    for (const w of intensityWords) { if (text.includes(w)) intensity++; }
    const hasQuestion = questionWords.some(w => text.includes(w));
    const depth = Math.min(1, text.length / 100); // longer messages = deeper

    // User message is a world event — no auto mode switching
    // Mode is the user's choice, set manually

    return { intensity: Math.min(1, intensity * 0.3), depth, needCare: Math.min(1, needCare * 0.4), hasQuestion, textLength: text.length };
  },

  // ── interaction mode ──

  /** Call after Companion sends a proactive message (not a reply). */
  onProactiveSent(ts) {
    this.lastProactiveSent = ts;
    this.consecutiveNoReply++;
  },

  // ── unified output ──

  checkForLifeSignal(now) {
    // Mode is user-controlled (manual switch), no auto-evaluation
    if (this.state !== 'READY') return null;
    const idleMin = Math.floor((now - this.lastInteraction) / 60000);
    let reason, hint;
    if (this.interactionCount === 0 && idleMin > 0) {
      reason = 'INITIAL_GREETING'; hint = '全新联系人，发起首次问候';
    } else if (this.interactionCount === 0 && new Date(now).getHours() >= 10) {
      reason = 'MORNING_CHECK_IN'; hint = '用户今天还没有聊天';
    } else {
      reason = 'PROLONGED_IDLE'; hint = `用户空闲 ${idleMin} 分钟`;
    }
    this.state = 'OBSERVING';
    return new LifeEngineEvent(reason, Math.min(0.95, idleMin / 480), hint, idleMin,
      this.lastUserMsgSignal ? { ...this.lastUserMsgSignal } : null);
  },

  status() {
    return {
      state: this.state,
      mode: this.interactionMode,
      idleMin: Math.floor((Date.now() - this.lastInteraction) / 60000),
      thresholdMin: Math.floor(this.idleThresholdMs / 60000),
      interactions: this.interactionCount,
      noReply: this.consecutiveNoReply,
      lastMsg: this.lastUserMsgSignal,
    };
  },
};

// ═══════════════════════════════════════════════════════════════
// EMOTION ENGINE
// ═══════════════════════════════════════════════════════════════
const EmotionEngine = {
  state: 'NEUTRAL', // NEUTRAL | HEIGHTENED | DISTRESSED
  baseline: EmotionalProfile.neutral(),
  current: EmotionalProfile.neutral(),
  derailment: 0,
  negWeight: 0,
  lastHash: '',

  reset() {
    this.state = 'NEUTRAL';
    this.baseline = EmotionalProfile.neutral();
    this.current = EmotionalProfile.neutral();
    this.derailment = 0;
    this.negWeight = 0;
    this.lastHash = '';
  },

  // Lightweight LLM call for sentiment VAD analysis
  async analyze(messages) {
    if (messages.length === 0) return;
    const hash = messages.map(m => m.role + ':' + m.content).join('|');
    if (hash === this.lastHash) return;

    const sys = 'Output ONLY JSON: {"valence":-1to1,"arousal":0to1,"dominance":0to1,"keyThemes":["chinese","words"]}';
    const convo = messages.slice(-6).map(m => (m.role === 'user' ? '用户:' : 'AI:') + m.content.slice(0,200)).join('\n');
    try {
      const reply = await DS.complete([
        { role: 'system', content: sys },
        { role: 'user', content: convo },
      ], { maxTokens: 128, label: 'sentiment' });
      const j = JSON.parse(reply.replace(/```[a-z]*\s*/g, '').trim());
      const p = new EmotionalProfile(
        parseFloat(j.valence) || 0,
        parseFloat(j.arousal) || 0.5,
        parseFloat(j.dominance) || 0.5,
        j.keyThemes || [],
      );
      this._update(p);
      this.lastHash = hash;
    } catch (e) {
      // keyword fallback
      const p = this._keywordFallback(messages);
      this._update(p);
      this.lastHash = hash;
    }
  },

  _update(p) {
    this.current = p;
    this.baseline = new EmotionalProfile(
      this.baseline.valence * 0.9 + p.valence * 0.1,
      this.baseline.arousal * 0.9 + p.arousal * 0.1,
      this.baseline.dominance * 0.9 + p.dominance * 0.1,
      this.baseline.keyThemes,
    );
    const shift = p.valence - this.baseline.valence;
    if (this.state === 'NEUTRAL' && (shift < -0.3 || p.isHighlyAroused())) {
      this.state = 'HEIGHTENED'; this.derailment = 1;
    } else if (this.state === 'HEIGHTENED') {
      if (shift < -0.15) { this.derailment++; if (this.derailment >= 3) this.state = 'DISTRESSED'; }
      else if (shift > -0.05) { this.derailment = Math.max(0, this.derailment - 1); if (this.derailment === 0) this.state = 'NEUTRAL'; }
    } else if (this.state === 'DISTRESSED') {
      if (shift > -0.1) { this.derailment = Math.max(0, this.derailment - 1); if (this.derailment <= 1) this.state = 'HEIGHTENED'; }
    }
    let w = 0;
    if (p.valence < -0.3) w += 0.3; if (p.valence < -0.6) w += 0.3;
    if (p.arousal > 0.7) w += 0.2; if (p.dominance < 0.3) w += 0.2;
    this.negWeight = Math.min(1, w);
  },

  _keywordFallback(messages) {
    const neg = ['担心','累','难','烦','焦虑','压力','不开心','难过','生气','崩溃','失眠','害怕','无聊','孤独'];
    let score = 0; const themes = [];
    for (const m of messages) {
      if (m.role !== 'user') continue;
      for (const w of neg) { if (m.content.includes(w)) { score += 0.15; if (!themes.includes(w)) themes.push(w); } }
    }
    return new EmotionalProfile(Math.max(-1, -score), Math.min(1, score * 1.5), 0.5, themes);
  },

  checkForEmotionalSignal() {
    let reason = null, urgency = 0;
    if (this.state === 'DISTRESSED') {
      urgency = Math.min(1, 0.6 + this.derailment * 0.1); reason = 'SUSTAINED_DISTRESS';
    } else if (this.state === 'HEIGHTENED') {
      urgency = 0.4 + this.negWeight * 0.3;
      reason = this.current.isHighlyAroused() ? 'HIGH_AROUSAL' : 'NEGATIVE_SHIFT';
    }
    if (reason && urgency > 0.35) {
      this.derailment = Math.max(0, this.derailment - 1);
      return new EmotionEngineEvent(reason, this.current, urgency);
    }
    return null;
  },

  status() {
    return {
      state: this.state,
      valence: this.current.valence.toFixed(2),
      arousal: this.current.arousal.toFixed(2),
      baselineVal: this.baseline.valence.toFixed(2),
      derailment: this.derailment,
      negWeight: this.negWeight.toFixed(2),
    };
  },
};

// ═══════════════════════════════════════════════════════════════
// EMOTION ENGINE — "Companion 的感受层" (desire lives here)
// ═══════════════════════════════════════════════════════════════
const EmotionState = {
  desireLevel: 0.0,          // 连接欲望 0~1
  desireBaseRate: 0.05,      // 基础积累速度 / 每分钟
  desireMultiplier: 1.0,     // 情感调节乘数

  reset() {
    this.desireLevel = 0.0;
    this.desireBaseRate = 0.05;
    this.desireMultiplier = 1.0;
  },

  /** Called every tick: accumulate desire based on idle time and emotional state */
  accumulateDesire(idleMinutes, emotionUrgency) {
    const gain = idleMinutes * this.desireBaseRate * this.desireMultiplier;
    this.desireLevel = Math.min(1.0, this.desireLevel + gain);
    // emotionUrgency boosts multiplier for next round
    if (emotionUrgency > 0.3) this.desireMultiplier = 1.0 + emotionUrgency * 1.5;
    else this.desireMultiplier = Math.max(0.5, this.desireMultiplier - 0.05); // decay
  },

  /** User entering PRESENT mode: companion has accumulated things to say. */
  entryBurst() {
    this.desireLevel = Math.min(1.0, this.desireLevel + 0.35);
    log('event', `💥 Desire burst: ${this.desireLevel.toFixed(2)} (PRESENT entry)`);
  },

  /** User interaction or proactive message satisfies desire */
  satisfyDesire() {
    this.desireLevel = Math.max(0, this.desireLevel - 0.4);
    this.desireMultiplier = 1.0;
  },

  /** User message content can nudge desire up or down */
  nudgeDesire(userMsgSignal) {
    if (!userMsgSignal) return;
    if (userMsgSignal.needCare > 0.3) this.desireLevel += 0.1; // user needs care → desire up
    if (userMsgSignal.hasQuestion) this.desireLevel += 0.05;    // user asking → desire up
  },

  status() {
    return {
      desire: this.desireLevel.toFixed(2),
      rate: this.desireBaseRate.toFixed(3),
      multiplier: this.desireMultiplier.toFixed(2),
    };
  },
};

// ── Persona (compatibility) ──
const Persona = {
  energy: 0.7, mood: 0.7, curiosity: 3, care: 3, sharing: 3, memory: 3,
  openness: 0.5, emotionalResonance: 0.5,
  reset() { Object.assign(this, { energy: 0.7, mood: 0.7, curiosity: 3, care: 3, sharing: 3, memory: 3, openness: 0.5, emotionalResonance: 0.5 }); },
  motivation() { return this.curiosity + this.care + this.sharing + this.memory; },
  isReceptive() { return this.energy > 0.4 && this.mood > 0.3; },
  status() { return { energy: this.energy.toFixed(2), mood: this.mood.toFixed(2), motivation: this.motivation(), openness: this.openness.toFixed(2), resonance: this.emotionalResonance.toFixed(2) }; },
};

// ═══════════════════════════════════════════════════════════════
// TRIGGER DECISION CLIENT
// ═══════════════════════════════════════════════════════════════
const DecisionClient = {
  async decide(messages, lifeEvent, emotionEvent) {
    const interactionMode = LifeEngine.interactionMode;
    const desireLevel = EmotionState.desireLevel;
    const desireThreshold = 0.5;

    // Determine strategy based on mode
    let strategy = 'reduce_frequency';
    if (interactionMode === 'PRESENT') {
      // PRESENT: user is here — easier to engage, natural conversation flow
      const userNeedCare = lifeEvent && lifeEvent.userMsgSignal ? lifeEvent.userMsgSignal.needCare : 0;
      const userIntensity = lifeEvent && lifeEvent.userMsgSignal ? lifeEvent.userMsgSignal.intensity : 0;
      const userHasQuestion = lifeEvent && lifeEvent.userMsgSignal ? lifeEvent.userMsgSignal.hasQuestion : false;

      // Lower threshold: in PRESENT, even small desire triggers (user is here, talk naturally)
      const presentThreshold = 0.15;
      if (desireLevel < presentThreshold) return TriggerDecision.noAction();

      if (userNeedCare > 0.2) {
        strategy = 'follow_up_care';
      } else if (userIntensity > 0.3 || userHasQuestion) {
        strategy = 'follow_up_deepen';
      } else if (desireLevel > presentThreshold) {
        strategy = 'follow_up_light';
      } else {
        return TriggerDecision.noAction();
      }
    } else {
      // ABSENT: check-in style — user may or may not reply
      const noReply = LifeEngine.consecutiveNoReply;
      const emotionUrgency = emotionEvent ? emotionEvent.urgency : 0;
      const userNeedCare = lifeEvent && lifeEvent.userMsgSignal ? lifeEvent.userMsgSignal.needCare : 0;

      if (emotionUrgency > 0.5 || userNeedCare > 0.5) {
        strategy = 'check_in';
      } else if (noReply > 3 && desireLevel > 0.7) {
        strategy = 'keep_company';
      } else if (noReply > 2) {
        strategy = 'reduce_frequency';
      }
    }

    if (!lifeEvent && !emotionEvent && desireLevel < desireThreshold) return TriggerDecision.noAction();

    const ctx = {
      interactionMode,
      strategy,
      desireLevel: desireLevel.toFixed(2),
      consecutiveNoReply: LifeEngine.consecutiveNoReply,
      recentConversation: messages.slice(-8).map(m => ({ role: m.role, content: m.content.slice(0, 200) })),
      lifeEvent: lifeEvent ? { reason: lifeEvent.reason, idleMinutes: lifeEvent.idleMinutes, contextHint: lifeEvent.contextHint } : null,
      emotionEvent: emotionEvent ? { reason: emotionEvent.reason, urgency: emotionEvent.urgency, valence: emotionEvent.snapshot.valence, arousal: emotionEvent.snapshot.arousal } : null,
    };

    const sys = `You are a proactive companion decision engine.
Interaction mode: ${interactionMode}. Companion strategy: ${strategy}.
Desire level: ${desireLevel.toFixed(2)}. No-reply count: ${LifeEngine.consecutiveNoReply}.

Guidelines:
PRESENT strategies (user is actively chatting):
- follow_up_care: user hinted at distress → offer warm, caring follow-up
- follow_up_deepen: conversation is deep/engaged → ask a thoughtful question to continue
- follow_up_light: natural, light continuation of the topic
- Only speak if it feels like natural conversation flow, not forced

ABSENT strategies (user may or may not reply):
- check_in: user seems distressed/silent → gently ask if they're okay
- reduce_frequency: give space, speak less often
- keep_company: user hasn't replied to several messages, keep sharing warmth

MORNING_CHECK_IN and INITIAL_GREETING are strong signals — speak warmly.
Respond ONLY with JSON: {"shouldSpeak":bool,"topicHint":"short Chinese topic or null","confidence":0.0-1.0}`;

    try {
      const reply = await DS.complete([
        { role: 'system', content: sys },
        { role: 'user', content: JSON.stringify(ctx) },
      ], { maxTokens: 256, label: 'trigger-decision' });
      const cleaned = reply.replace(/```[a-z]*\s*/g, '').trim();
      const j = JSON.parse(cleaned.slice(cleaned.indexOf('{'), cleaned.lastIndexOf('}') + 1));
      log('decision', `→ shouldSpeak=${j.shouldSpeak} hint="${j.topicHint}" conf=${j.confidence}`);
      return new TriggerDecision(!!j.shouldSpeak, j.topicHint === 'null' || !j.topicHint ? null : j.topicHint, parseFloat(j.confidence) || 0);
    } catch (e) {
      log('error', `Decision parse failed: ${e.message}`);
      return lifeEvent || emotionEvent ? new TriggerDecision(true, null, 0.3) : TriggerDecision.noAction();
    }
  },

  async generateMessage(topicHint, messages) {
    const mode = LifeEngine.interactionMode;
    let sys;
    if (mode === 'PRESENT') {
      sys = `你正在和用户进行实时对话。用户就在旁边，你们在聊天。你需要主动承接话题或发起自然延续。
语气要求：
- 像是在面对面聊天一样自然，承接刚才的话题
- 可以用"对了"、"说起来"、"你刚才说..."这类自然的承接词
- 可以追问细节、分享感受、或者提出新话题
- 不要像在检查用户近况（那是留言模式才做的），要用在场聊天的语气
- 保持简短（2-4句话）` + memoryContext();
    } else {
      sys = `用户在不在场状态，可能回也可能不回你的消息。你需要主动关心或陪伴。
语气要求：
- 温暖、自然、不催促，像给朋友留言
- 不要假装知道用户当下的状态（你不在场）
- 可以分享你想到的事、关心用户近况、或者给一个温暖的问候
- 不要用"我注意到"、"根据分析"这类机械的表达
- 保持简短（2-4句话）` + memoryContext();
    }
    let ctx = '最近的对话：\n';
    for (const m of messages.slice(-8)) ctx += `${m.role==='user'?'用户':'AI'}: ${m.content}\n`;
    if (topicHint) ctx += `\n建议话题：${topicHint}\n`;
    ctx += '\n请生成一条主动发起的消息：';
    return await DS.complete([
      { role: 'system', content: sys },
      { role: 'user', content: ctx },
    ], { maxTokens: 200, reasoning: 'medium', label: 'generate-proactive' });
  },
};

// ═══════════════════════════════════════════════════════════════
// ORCHESTRATOR
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// ATTENTION SCHEDULER — replaces fixed-interval polling
// ═══════════════════════════════════════════════════════════════
const SHORT_WAVE_MS = 25 * 60 * 1000;   // 25 min
const LONG_WAVE_MS  = 90 * 60 * 1000;   // 90 min
const MIN_CHECK_MS  = 15 * 1000;         // min 15s between checks
const MAX_CHECK_MS  = 20 * 60 * 1000;    // max 20min between checks
const T50_MS        = 2 * 60 * 60 * 1000; // idle time for P=0.5

let schedulerId = null;
let testMode = false;

/** Attention probability: how likely Companion is "thinking of" the user right now. */
function attentionProbability(idleMs, mode, emotionUrgency) {
  if (idleMs <= 0) return 0.01;

  // Sigmoid base: rises with idle time
  const sigmoid = 1.0 / (1.0 + Math.exp(-(idleMs - T50_MS) / (T50_MS / 4)));

  // Dual-wave fluctuation
  const shortWave = Math.sin(2 * Math.PI * idleMs / SHORT_WAVE_MS) * 0.08;
  const longWave  = Math.sin(2 * Math.PI * idleMs / LONG_WAVE_MS) * 0.12;

  // Both modes have natural attention rhythm — PRESENT is for follow-up, ABSENT for check-in
  const modeFactor = 1.0;

  // Emotional urgency boosts attention
  const emotionBoost = 1.0 + (emotionUrgency || 0) * 0.5;

  let p = (sigmoid + shortWave + longWave) * modeFactor * emotionBoost;
  // Add small random noise (±5%)
  p += (Math.random() - 0.5) * 0.1;
  return Math.max(0.01, Math.min(0.95, p));
}

/** Compute how long to wait before next check, based on current attention. */
function computeNextDelay(idleMs, mode, emotionUrgency) {
  const p = attentionProbability(idleMs, mode, emotionUrgency);
  // High attention → short delay; low attention → long delay
  // Map P from [0.01, 0.95] to [MAX_CHECK, MIN_CHECK]
  const logP = Math.log(p + 0.001);
  const logMin = Math.log(0.01);
  const logMax = Math.log(0.95);
  const frac = (logP - logMin) / (logMax - logMin); // 0→low, 1→high
  const delay = MAX_CHECK_MS - frac * (MAX_CHECK_MS - MIN_CHECK_MS);

  // In test mode, compress to 10s-2min range
  if (testMode) {
    return Math.max(10_000, Math.min(120_000, delay / 10));
  }
  return Math.max(MIN_CHECK_MS, Math.min(MAX_CHECK_MS, delay));
}

function scheduleNextCheck() {
  if (!schedulerId) return;
  const now = Date.now();
  const idleMs = now - LifeEngine.lastInteraction;
  const mode = LifeEngine.interactionMode;
  const urgency = EmotionEngine.checkForEmotionalSignal()?.urgency || 0;
  const delay = computeNextDelay(idleMs, mode, urgency);
  const p = attentionProbability(idleMs, mode, urgency);
  log('info', `⏱ Next check in ${(delay/1000).toFixed(0)}s (P=${p.toFixed(3)} mode=${mode} idle=${(idleMs/60000).toFixed(1)}min)`);
  schedulerId = setTimeout(onAttentionTick, delay);
}

function startScheduler() {
  if (schedulerId) return;
  log('info', '🧠 AttentionScheduler started');
  scheduleNextCheck();
}

function stopScheduler() {
  if (!schedulerId) return;
  clearTimeout(schedulerId);
  schedulerId = null;
}

async function onAttentionTick() {
  schedulerId = null; // clear so we can re-schedule
  await onTimerTick();
  if (schedulerId === null) scheduleNextCheck(); // only if not stopped
}

function enableTestMode() {
  LifeEngine.idleThresholdMs = 60_000;
  testMode = true;
  if (schedulerId) { stopScheduler(); startScheduler(); }
  log('event', '🧪 TEST MODE: idleThreshold=1min, attention intervals compressed');
}

function onModeToggle() {
  const newMode = document.getElementById('mode-toggle').value;
  const oldMode = LifeEngine.interactionMode;
  LifeEngine.interactionMode = newMode;
  if (newMode === 'PRESENT' && oldMode !== 'PRESENT') {
    EmotionState.entryBurst();
    log('event', '📡 切换 → PRESENT (强互动) 💥 desire burst');
  } else {
    log('event', `📡 切换 → ${newMode}`);
  }
}

async function evaluatePostReply(userText, messages) {
  LifeEngine.onUserMessage(Date.now(), userText);
  EmotionState.satisfyDesire();
  EmotionState.nudgeDesire(LifeEngine.lastUserMsgSignal);
  await EmotionEngine.analyze(messages);
  await evaluateAllTriggers(messages);
}

async function onTimerTick() {
  if (!document.getElementById('api-key').value.trim()) return;

  const now = Date.now();
  LifeEngine.onTimerTick(now);

  // Accumulate desire based on idle time
  const idleMin = (now - LifeEngine.lastInteraction) / 60000;
  const emotionUrgency = EmotionEngine.checkForEmotionalSignal()?.urgency || 0;
  EmotionState.accumulateDesire(Math.max(0.5, idleMin), emotionUrgency);

  const lifeEvent = LifeEngine.checkForLifeSignal(now);
  if (lifeEvent) {
    log('event', `🔔 LifeEvent: ${lifeEvent.reason} mode=${LifeEngine.interactionMode} desire=${EmotionState.desireLevel.toFixed(2)} (idle=${lifeEvent.idleMinutes}min)`);
    await EmotionEngine.analyze(getMessages());
    await evaluateAllTriggers(getMessages(), lifeEvent);
  } else {
    updateDebug();
  }
}

async function evaluateAllTriggers(messages, lifeEventFromTimer) {
  const lifeEvent = lifeEventFromTimer || LifeEngine.checkForLifeSignal(Date.now());
  const emotionEvent = EmotionEngine.checkForEmotionalSignal();
  if (emotionEvent) log('event', `💭 EmotionEvent: ${emotionEvent.reason} urgency=${emotionEvent.urgency.toFixed(2)}`);

  const decision = await DecisionClient.decide(messages, lifeEvent, emotionEvent);
  log('decision', `→ ${decision.shouldSpeak?'SPEAK':'SILENT'} mode=${LifeEngine.interactionMode} desire=${EmotionState.desireLevel.toFixed(2)} strategy=${LifeEngine.interactionMode==='ABSENT'?'check_in/reduce/company':'N/A'}`);
  if (!decision.shouldSpeak) { updateDebug(); return; }

  try {
    const msg = await DecisionClient.generateMessage(decision.topicHint, messages);
    addMessage('assistant', '[主动关心] ' + msg, true);
    LifeEngine.onProactiveSent(Date.now());
    EmotionState.satisfyDesire();
    Persona.mood = Math.min(1, Persona.mood + 0.05);
    log('event', `✅ Proactive sent (noReply=${LifeEngine.consecutiveNoReply})`);
  } catch (e) {
    log('error', `Generate failed: ${e.message}`);
  }
  updateDebug();
}

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
let chatMessages = [];
let currentContact = 'default';

function storageKey() {
  return `companion_msgs_${currentContact}`;
}

function saveMessages() {
  try {
    localStorage.setItem(storageKey(), JSON.stringify(chatMessages.slice(-200)));
  } catch(e) { /* quota exceeded, ignore */ }
}

function loadMessages() {
  try {
    const raw = localStorage.getItem(storageKey());
    if (raw) chatMessages = JSON.parse(raw);
  } catch(e) { chatMessages = []; }
}

// ═══════════════════════════════════════════════════════════════
// COMPANION MEMORY
// ═══════════════════════════════════════════════════════════════
let userMemory = '';

function memoryKey() {
  return `companion_memory_${currentContact}`;
}

function loadMemory() {
  try {
    userMemory = localStorage.getItem(memoryKey()) || '';
  } catch(e) { userMemory = ''; }
}

function saveMemory() {
  try {
    localStorage.setItem(memoryKey(), userMemory);
  } catch(e) { /* ignore */ }
}

/**
 * Use LLM to extract and update key facts about the user from recent conversation.
 * Called periodically (not every message) to keep memory fresh.
 */
async function updateMemory(messages) {
  if (messages.length < 2) return;
  const current = userMemory;
  const recent = messages.slice(-6).map(m => `${m.role==='user'?'用户':'AI'}: ${m.content.slice(0,300)}`).join('\n');

  const sys = `你是一个记忆管理助手。根据最近的对话，更新你对用户的记忆摘要。
现有记忆：
${current || '(空)'}

最近对话：
${recent}

请输出更新后的记忆摘要（纯文本，不超过200字）。保留重要的旧信息，加入新发现的事实、偏好、情绪状态、生活习惯等。只输出记忆内容，不要加说明。`;

  try {
    const reply = await DS.complete([
      { role: 'system', content: sys },
    ], { maxTokens: 300, label: 'memory-update' });
    if (reply && reply.trim()) {
      userMemory = reply.trim();
      saveMemory();
      log('info', `🧠 Memory updated (${userMemory.length} chars)`);
      document.getElementById('memory-display').textContent = userMemory || '(暂无记忆)';
    }
  } catch(e) {
    // Memory update is best-effort, silent on failure
  }
}

function memoryContext() {
  return userMemory ? `\n关于用户（供参考，无需逐条提及，自然融入对话中）：\n${userMemory}` : '';
}

// ═══════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════

function getMessages() { return chatMessages; }

function addMessage(role, content, isProactive) {
  const m = { role, content, timestamp: Date.now(), isProactive: !!isProactive };
  chatMessages.push(m);
  saveMessages();
  const div = document.createElement('div');
  div.className = 'msg ' + (isProactive ? 'proactive' : role);
  div.innerHTML = `<div class="bubble">${escapeHtml(content)}<div class="meta">${fmtTime(m.timestamp)}</div></div>`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

async function send() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);

  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { addMessage('assistant', '⚠️ 请先设置 DeepSeek API Key'); return; }

  try {
    const sysPrompt = '你是一个温暖、理性能干的AI伴侣。请简短地回复用户（2-4句话）。'
      + memoryContext()
      + '\n用户说：';
    const reply = await DS.complete([
      { role: 'system', content: sysPrompt },
      { role: 'user', content: text },
    ], { maxTokens: 1024, reasoning: 'high', label: 'main-reply' });
    addMessage('assistant', reply);

    // Post-reply proactive evaluation + memory update
    await evaluatePostReply(text, chatMessages);
    updateMemory(chatMessages); // async, best-effort
    updateDebug();
  } catch (e) {
    addMessage('assistant', '❌ 错误: ' + e.message);
    log('error', `Send failed: ${e.message}`);
  }
}

function saveApiKey() {
  const k = document.getElementById('api-key').value.trim();
  localStorage.setItem('ds_api_key', k);
  log('info', 'API Key 已保存');
}

function updateDebug() {
  const l = LifeEngine.status();
  const modeColor = l.mode === 'PRESENT' ? 'val' : 'warn';
  document.getElementById('state-life').innerHTML =
    `<h3>🌍 LifeEngine (周围世界)</h3>`
    + `模式=<span class="${modeColor}">${l.mode}</span> `
    + `引擎状态=<span class="val">${l.state}</span> `
    + `空闲=<span class="val">${l.idleMin}min</span> (阈值=${l.thresholdMin}min)<br>`
    + `互动次数=<span class="dim">${l.interactions}</span> `
    + `未回复=<span class="${l.noReply>2?'err':'dim'}">${l.noReply}</span> `
    + (l.lastMsg ? `用户信号=(强度${l.lastMsg.intensity?.toFixed(1)} 关心${l.lastMsg.needCare?.toFixed(1)})` : '');

  const e = EmotionEngine.status();
  document.getElementById('state-emotion').innerHTML =
    `<h3>💭 EmotionEngine (感受)</h3>`
    + `状态=<span class="${e.state==='DISTRESSED'?'err':e.state==='HEIGHTENED'?'warn':'val'}">${e.state}</span> `
    + `V=<span class="val">${e.valence}</span> A=<span class="val">${e.arousal}</span><br>`
    + `基线V=<span class="dim">${e.baselineVal}</span> `
    + `偏离=<span class="dim">${e.derailment}</span>`;

  const d = EmotionState.status();
  document.getElementById('state-persona').innerHTML =
    `<h3>❤️ 欲望 (Emotion)</h3>`
    + `欲望=<span class="val">${d.desire}</span> `
    + `基础速率=<span class="dim">${d.rate}</span> `
    + `情感乘数=<span class="${d.multiplier>1.3?'warn':'dim'}">${d.multiplier}</span>`;

  const idleMs = Date.now() - LifeEngine.lastInteraction;
  const p = attentionProbability(idleMs, LifeEngine.interactionMode, EmotionEngine.checkForEmotionalSignal()?.urgency || 0);
  document.getElementById('state-scheduler').innerHTML =
    `<h3>🧠 注意力调度</h3>P(想起)=<span class="val">${(p*100).toFixed(1)}%</span> 空闲=<span class="dim">${(idleMs/60000).toFixed(1)}min</span> 运行=<span class="${schedulerId?'val':'err'}">${!!schedulerId}</span>`;
}

function log(cat, msg) {
  const el = document.getElementById('log-area');
  const d = document.createElement('div');
  d.className = 'log ' + cat;
  d.textContent = `[${fmtTime(Date.now())}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function fmtTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ── init ──
document.getElementById('contact-select').onchange = function() {
  // Save current before switching
  saveMessages();
  saveMemory();
  // Switch
  currentContact = this.value;
  loadMessages();
  loadMemory();
  document.getElementById('memory-display').textContent = userMemory || '(暂无记忆)';
  // Re-render
  const container = document.getElementById('messages');
  container.innerHTML = '';
  for (const m of chatMessages) {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.isProactive ? 'proactive' : m.role);
    div.innerHTML = `<div class="bubble">${escapeHtml(m.content)}<div class="meta">${fmtTime(m.timestamp)}</div></div>`;
    container.appendChild(div);
  }

  const isTest = this.value === 'test';
  if (isTest) {
    enableTestMode();
    log('event', '🧪 切换到测试联系人 — 1分钟后将收到主动消息');
  } else {
    LifeEngine.idleThresholdMs = 2 * 60 * 60 * 1000;
    schedulerInterval = 120_000;
    if (schedulerId) { stopScheduler(); startScheduler(); }
    log('info', '切换到正常模式');
  }
  LifeEngine.reset();
  EmotionEngine.reset();
  EmotionState.reset();
  Persona.reset();
  updateDebug();
};

// Restore API key
const savedKey = localStorage.getItem('ds_api_key');
if (savedKey) document.getElementById('api-key').value = savedKey;

// Load persisted data
loadMessages();
loadMemory();
document.getElementById('memory-display').textContent = userMemory || '(暂无记忆)';
// Re-render saved messages
(function() {
  const container = document.getElementById('messages');
  for (const m of chatMessages) {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.isProactive ? 'proactive' : m.role);
    div.innerHTML = `<div class="bubble">${escapeHtml(m.content)}<div class="meta">${fmtTime(m.timestamp)}</div></div>`;
    container.appendChild(div);
  }
})();

// Start
startScheduler();
updateDebug();
setInterval(updateDebug, 5000);
log('info', '🚀 Companion Web Shell ready');
log('info', '运行: python3 server.py，然后浏览器打开 http://localhost:8080');
log('info', '切换到 🧪 测试联系人，发一条消息后等待主动消息');
</script>
