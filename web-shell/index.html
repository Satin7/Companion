<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companion Web Shell</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;display:flex;height:100vh;background:#f5f7fa}
/* ── chat panel ── */
#chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
#chat-header{background:#2E3A59;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
#chat-header h1{font-size:18px;flex:1}
#chat-header select{background:#4F46E5;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:13px}
#api-key-area{background:#fff3cd;padding:6px 12px;display:flex;gap:8px;align-items:center;font-size:13px}
#api-key-area input{flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px}
#api-key-area button{background:#4F46E5;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:13px}
#messages{flex:1;overflow-y:auto;padding:12px}
#messages .msg{display:flex;margin-bottom:8px}
#messages .msg.user{justify-content:flex-end}
#messages .msg.assistant{justify-content:flex-start}
#messages .msg.proactive{justify-content:flex-start}
#messages .bubble{max-width:75%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5}
#messages .user .bubble{background:#4F46E5;color:#fff}
#messages .assistant .bubble{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.1)}
#messages .proactive .bubble{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D}
#messages .meta{font-size:10px;opacity:.6;margin-top:4px}
#messages .typing .bubble{background:#fff;color:#6c7086;box-shadow:0 1px 3px rgba(0,0,0,.1);font-style:italic}
#input-area{display:flex;padding:8px 12px;background:#fff;gap:8px;border-top:1px solid #e5e7eb}
#input-area input{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
#input-area button{background:#4F46E5;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}

/* ── debug panel ── */
#debug-panel{width:380px;background:#1e1e2e;color:#cdd6f4;display:flex;flex-direction:column;overflow-y:auto;font-size:12px;font-family:monospace}
#debug-panel h2{font-size:14px;padding:12px 14px;background:#313244;color:#f5c2e7;margin:0}
.section{padding:8px 14px;border-bottom:1px solid #313244}
.section h3{font-size:12px;color:#89b4fa;margin-bottom:4px}
.section>summary{cursor:pointer;color:#89b4fa;font-size:12px;font-weight:bold;list-style-position:inside}
.section>summary:hover{color:#b4befe}
.section .val{color:#a6e3a1}
.section .warn{color:#fab387}
.section .err{color:#f38ba8}
.section .dim{color:#6c7086}
#log-area{flex:1;overflow-y:auto;padding:8px 14px}
#log-area .log{margin-bottom:2px}
#log-area .log.info{color:#a6adc8}
#log-area .log.event{color:#f9e2af}
#log-area .log.decision{color:#89b4fa}
#log-area .log.api{color:#a6e3a1}
#log-area .log.error{color:#f38ba8}
.code-box{white-space:pre-wrap;max-height:180px;overflow-y:auto;background:#11111b;border:1px solid #313244;padding:8px;border-radius:6px;color:#cdd6f4}
</style>
</head>
<body>

<!-- ═══════════ CHAT PANEL ═══════════ -->
<div id="chat-panel">
  <div id="chat-header">
    <h1>Companion Web Shell</h1>
    <select id="contact-select">
      <option value="default">Companion</option>
      <option value="test">🧪 主动消息测试 (1分钟)</option>
    </select>
    <span style="font-size:12px;margin-left:8px">运行模式:</span>
    <select id="runtime-mode">
      <option value="normal" selected>普通模式</option>
      <option value="live">Live 模式</option>
    </select>
    <span style="font-size:12px;margin-left:8px">互动强度:</span>
    <select id="mode-toggle">
      <option value="ABSENT">ABSENT (弱互动)</option>
      <option value="PRESENT">PRESENT (强互动)</option>
    </select>
    <span style="font-size:12px;margin-left:8px">🔊 语音:</span>
    <select id="voice-mode-toggle">
      <option value="0">关闭</option>
      <option value="1">开启</option>
    </select>
  </div>
  <div id="api-key-area">
    <span>🔑 DeepSeek API Key:</span>
    <input id="api-key" type="password" placeholder="sk-...">
    <button onclick="saveApiKey()">保存</button>
    <span id="runtime-hint" style="font-size:11px;color:#856404">普通模式 — HTTP /core/chat/reply</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">发送</button>
  </div>
</div>

<!-- ═══════════ DEBUG PANEL ═══════════ -->
<div id="debug-panel">
  <h2>🔍 调试面板</h2>
  <div class="section" id="state-decision" style="background:#252536"></div>
  <div class="section" id="state-life"></div>
  <div class="section" id="state-emotion"></div>
  <div class="section" id="state-persona"></div>
  <div class="section" id="state-engagement"></div>
  <div class="section" id="state-scheduler"></div>
  <details class="section">
    <summary>🧠 记忆</summary>
    <div id="memory-display" class="dim" style="white-space:pre-wrap;max-height:120px;overflow-y:auto;margin-top:6px">(暂无记忆)</div>
  </details>
  <details class="section">
    <summary>🗂 长期记忆</summary>
    <div id="long-memory-display" class="code-box dim" style="margin-top:6px">(暂无)</div>
  </details>
  <details class="section">
    <summary>📒 中期摘要</summary>
    <div id="mid-memory-display" class="code-box dim" style="margin-top:6px">(暂无)</div>
  </details>
  <details class="section" id="prompt-details">
    <summary>🧩 最终 Prompt（发给模型）</summary>
    <div id="prompt-display" class="code-box dim" style="margin-top:6px">(暂无)</div>
  </details>
  <details class="section">
    <summary>📤 主动消息发送给 DS</summary>
    <div id="proactive-ds-display" class="code-box dim" style="margin-top:6px">(暂无)</div>
  </details>
  <div id="log-area"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Companion Web Shell — dual-mode frontend
//   Normal mode : simple HTTP /core/chat/reply (one question → one answer)
//   Live mode   : WebSocket-driven realtime session (state engines on backend)
// ═══════════════════════════════════════════════════════════════

// ── constants ──
const CORE_USER_ID = 'web-default';
let currentContact = 'default';
let runtimeMode = 'normal'; // 'normal' | 'live'

// ── state ──
let chatMessages = [];
let userMemory = {
  summary: '',
  timeline: [],
  facts: [],
  patterns: '',
  updated: 0,
};
let debugState = {};
let lastProactiveDsRequest = null;
let lastSnapshot = null;
let lastActivity = Date.now();
let lastHistoryCount = null;

// ── helpers ──
function coreHeaders() {
  const apiKey = document.getElementById('api-key').value.trim();
  const h = { 'Content-Type': 'application/json' };
  if (apiKey) h['Authorization'] = 'Bearer ' + apiKey;
  return h;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function fmtTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

// ── voice mode ──
let voiceEnabled = (localStorage.getItem('voiceMode') === '1');

function getVoiceMode() {
  return voiceEnabled ? '1' : '0';
}

function saveVoiceMode(val) {
  voiceEnabled = (val === '1');
  localStorage.setItem('voiceMode', val);
  document.getElementById('voice-mode-toggle').value = val;
}

let _audioEl = null;

function _isProxyPort() {
  // Detect if we're accessing through the web-shell proxy (port 8080).
  // Handles both localhost:8080 and GitHub Codespaces URLs like xxx-8080.app.github.dev
  return location.port === '8080' || /-8080\./.test(location.hostname);
}

function _playSequence(urls, index) {
  if (index >= urls.length) return;
  const url = urls[index];
  if (!url) { _playSequence(urls, index + 1); return; }
  // Build URL with proxy prefix if needed
  let fullUrl = url;
  if (!url.startsWith('http')) {
    if (_isProxyPort() && url.startsWith('/chat/audio/')) fullUrl = '/core' + url;
    fullUrl = location.origin + fullUrl;
  }
  if (_audioEl) { _audioEl.pause(); _audioEl = null; }
  const el = new Audio(fullUrl);
  _audioEl = el;
  el.onended = () => { _playSequence(urls, index + 1); };
  el.onerror = () => { log('error', `语音加载失败: ${fullUrl}`); _playSequence(urls, index + 1); };
  el.play().catch((err) => { log('error', `播放被阻止: ${err.message}`); _playSequence(urls, index + 1); });
}

function playAudio(url) {
  if (!url) return;
  // Build absolute URL
  let fullUrl = url;
  if (!url.startsWith('http')) {
    // If accessing through the web-shell proxy, prepend /core prefix
    if (_isProxyPort() && url.startsWith('/chat/audio/')) {
      fullUrl = '/core' + url;
    }
    fullUrl = location.origin + fullUrl;
  }
  log('info', `🔊 播放语音: ${fullUrl}`);
  // Stop any currently playing audio
  if (_audioEl) {
    _audioEl.pause();
    _audioEl = null;
  }
  const el = new Audio(fullUrl);
  el.preload = 'auto';
  _audioEl = el;
  el.oncanplaythrough = () => { log('info', '🔊 音频已加载就绪'); };
  el.onended = () => { _audioEl = null; log('info', '🔊 语音播放完毕'); };
  el.onerror = () => { _audioEl = null; log('error', `语音加载失败: ${fullUrl}`); };
  el.play().then(() => {
    log('info', '🔊 开始播放');
  }).catch((err) => {
    log('error', `语音播放被阻止: ${err.message}`);
  });
}

function log(cat, msg) {
  const el = document.getElementById('log-area');
  const d = document.createElement('div');
  d.className = 'log ' + cat;
  d.textContent = `[${fmtTime(Date.now())}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function jsonPretty(v) {
  try { return JSON.stringify(v, null, 2); }
  catch (_) { return String(v); }
}

function memoryDisplayText() {
  const lines = [];
  if (userMemory.summary) lines.push(userMemory.summary);
  if (userMemory.facts && userMemory.facts.length) lines.push('--- 关键信息 ---\n' + userMemory.facts.map(f => '• ' + f).join('\n'));
  if (userMemory.timeline && userMemory.timeline.length) lines.push('--- 时间线 ---\n' + userMemory.timeline.map(t => `${t.date} ${t.topic}`).join('\n'));
  if (userMemory.patterns) lines.push('--- 模式 ---\n' + userMemory.patterns);
  return lines.length ? lines.join('\n\n') : '(暂无记忆)';
}

function renderMemoryViews() {
  const views = debugState.memory_views || {};
  const longTerm = views.long_term || {};
  const midTerm = views.mid_term || {};
  document.getElementById('long-memory-display').textContent = jsonPretty(longTerm);
  document.getElementById('mid-memory-display').textContent = jsonPretty(midTerm);
}

function renderPromptDisplay() {
  const chatDebug = debugState.chat_debug || {};
  const payload = {
    at: chatDebug.at || null,
    request: chatDebug.request || {},
    final_system_prompt: chatDebug.final_system_prompt || '',
    llm_messages: chatDebug.llm_messages || [],
  };
  document.getElementById('prompt-display').textContent = jsonPretty(payload);
}

function renderProactiveDsDisplay() {
  const payload = {
    client_generate_proactive: lastProactiveDsRequest || null,
    core_proactive_decision: debugState.proactive_debug || {},
  };
  document.getElementById('proactive-ds-display').textContent = jsonPretty(payload);
}

async function refreshDebugState() {
  try {
    const resp = await fetch('/core/debug/state', {
      method: 'POST',
      headers: coreHeaders(),
      body: JSON.stringify({ user_id: CORE_USER_ID, contact_id: currentContact }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    debugState = await resp.json();
    renderMemoryViews();
    renderPromptDisplay();
    renderProactiveDsDisplay();
    renderEnginesSnapshot();
    // Normal mode: proactive messages from the core scheduler arrive via history
    if (runtimeMode !== 'live' && typeof debugState.history_count === 'number') {
      if (lastHistoryCount !== null && debugState.history_count !== lastHistoryCount) {
        lastHistoryCount = debugState.history_count;
        log('event', '📨 检测到新消息（可能为主动发言），已同步');
        await syncConversationFromCore();
        return;
      }
      lastHistoryCount = debugState.history_count;
    }
  } catch (e) {
    log('error', `刷新调试状态失败: ${e.message}`);
  }
}

// ── message rendering ──

function addMessage(role, content, isProactive) {
  const m = { role, content, timestamp: Date.now(), isProactive: !!isProactive };
  chatMessages.push(m);
  const div = document.createElement('div');
  div.className = 'msg ' + (isProactive ? 'proactive' : role);
  div.innerHTML = `<div class="bubble">${escapeHtml(content)}<div class="meta">${fmtTime(m.timestamp)}</div></div>`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

// ── streaming bubbles ──
const _streamBubbles = {};  // reply_id → { div, content }

function _ensureStreamBubble(replyId, role) {
  if (_streamBubbles[replyId]) return _streamBubbles[replyId];
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.id = 'bubble-' + replyId;
  div.appendChild(bubble);
  document.getElementById('messages').appendChild(div);
  const entry = { div, content: '' };
  _streamBubbles[replyId] = entry;
  return entry;
}

function _appendToken(replyId, token) {
  const entry = _streamBubbles[replyId];
  if (!entry) return;
  entry.content += token;
  const bubble = document.getElementById('bubble-' + replyId);
  if (bubble) {
    bubble.innerHTML = escapeHtml(entry.content) + '<span class="cursor">▊</span>';
  }
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function _finalizeBubble(replyId, fullText, segments, audioUrls) {
  const entry = _streamBubbles[replyId];
  if (!entry) return;
  delete _streamBubbles[replyId];
  const isProactive = entry.div.classList.contains('proactive');
  const ts = Date.now();
  const segs = (Array.isArray(segments) && segments.filter(Boolean).length)
    ? segments.filter(Boolean)
    : [fullText || entry.content];
  const audios = Array.isArray(audioUrls) ? audioUrls : [];
  // Replace the streaming bubble with one persisted bubble per segment
  entry.div.remove();
  for (let i = 0; i < segs.length; i++) {
    chatMessages.push({ role: 'assistant', content: segs[i], timestamp: ts, isProactive, audio_url: audios[i] || null });
  }
  renderMessages();
}

// ── typing indicator ──
let _typingDiv = null;

function showTypingIndicator(active) {
  if (active) {
    if (_typingDiv) return;
    _typingDiv = document.createElement('div');
    _typingDiv.className = 'msg typing';
    _typingDiv.innerHTML = '<div class="bubble">Companion 正在输入...</div>';
    document.getElementById('messages').appendChild(_typingDiv);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  } else {
    if (_typingDiv) {
      _typingDiv.remove();
      _typingDiv = null;
    }
  }
}

// ── debug panel update (driven by thinking.state pushes) ──
function updateDebugFromThinking(st) {
  // st = { desire, attention_p, emotion_state, life_state, mode, idle_min }
  if (st) {
    document.getElementById('state-persona').innerHTML =
      `<h3>❤️ 欲望 (Desire)</h3>欲望=<span class="val">${st.desire || '--'}</span> P(注意)=<span class="val">${st.attention_p || '--'}</span>`;
    document.getElementById('state-life').innerHTML =
      `<h3>🌍 LifeEngine (周围世界)</h3>模式=<span class="${st.mode==='PRESENT'?'val':'warn'}">${st.mode||'--'}</span> ` +
      `状态=<span class="val">${st.life_state||'--'}</span> 空闲=<span class="val">${st.idle_min||'--'}min</span>`;
    document.getElementById('state-emotion').innerHTML =
      `<h3>💭 EmotionEngine (感受)</h3>状态=<span class="${st.emotion_state==='DISTRESSED'?'err':st.emotion_state==='HEIGHTENED'?'warn':'val'}">${st.emotion_state||'--'}</span>`;
  }
}

function updateDebugFromDecision(d) {
  if (d) {
    const outcome = d.should_speak
      ? '<span class="val">✅ should_speak=true</span>'
      : '<span class="dim">⏭ should_speak=false</span>';
    document.getElementById('state-decision').innerHTML =
      `<h3>📋 决策快照</h3>策略=<span class="val">${d.strategy||'--'}</span> ` +
      `shouldSpeak=${d.should_speak?'<span class="val">true</span>':'<span class="dim">false</span>'} ` +
      `conf=<span class="dim">${d.confidence||'--'}</span><br>` +
      `hint=<span class="dim">${d.topic_hint||'--'}</span> ` +
      `factors=<span class="dim">${jsonPretty(d.factors||{})}</span>`;
  }
}

// ── engine snapshot rendering (works in both normal and live mode) ──
function renderEnginesSnapshot() {
  const eng = debugState.engines || {};
  const life = eng.life || {};
  const emo = eng.emotion || {};
  const des = eng.desire || {};
  const per = eng.persona || {};
  const dec = eng.last_decision || null;

  if (dec) {
    updateDebugFromDecision(dec);
  } else {
    document.getElementById('state-decision').innerHTML =
      `<h3>📋 决策快照</h3><span class="dim">(暂无决策${runtimeMode === 'live' ? '' : ' — 普通模式不评估主动发言'})</span>`;
  }

  document.getElementById('state-life').innerHTML =
    `<h3>🌍 LifeEngine (周围环境)</h3>模式=<span class="${eng.mode === 'PRESENT' ? 'val' : 'warn'}">${eng.mode || '--'}</span> ` +
    `状态=<span class="val">${life.state || '--'}</span> 空闲=<span class="val">${life.idleMin ?? '--'}min</span><br>` +
    `阈值=<span class="dim">${life.thresholdMin ?? '--'}min</span> 互动=<span class="dim">${life.interactions ?? '--'}</span> ` +
    `未回=<span class="dim">${life.noReply ?? '--'}</span>`;

  const emoState = emo.state || '--';
  document.getElementById('state-emotion').innerHTML =
    `<h3>💭 EmotionEngine (情绪)</h3>状态=<span class="${emoState === 'DISTRESSED' ? 'err' : emoState === 'HEIGHTENED' ? 'warn' : 'val'}">${emoState}</span> ` +
    `V=<span class="val">${emo.valence || '--'}</span> A=<span class="val">${emo.arousal || '--'}</span><br>` +
    `基线V=<span class="dim">${emo.baselineVal || '--'}</span> 脱轨=<span class="dim">${emo.derailment ?? '--'}</span> ` +
    `负权重=<span class="dim">${emo.negWeight || '--'}</span>`;

  document.getElementById('state-persona').innerHTML =
    `<h3>❤️ 欲望 (Desire)</h3>欲望=<span class="val">${des.desire || '--'}</span> 门槛=<span class="val">${eng.threshold || '--'}</span> P(注意)=<span class="val">${eng.attention_p || '--'}</span><br>` +
    `速率=<span class="dim">${des.rate || '--'}</span> 倍率=<span class="dim">${des.multiplier || '--'}</span> ` +
    `follow-up=<span class="${eng.follow_up_mode === 'deepen' ? 'val' : 'dim'}">${eng.follow_up_mode || '--'}</span>`;

  // Engagement section
  const engInfo = eng.engagement || {};
  document.getElementById('state-engagement').innerHTML =
    `<h3>🎚 互动偏好 (Engagement)</h3>状态=<span class="${engInfo.level==='eager'?'val':engInfo.level==='quiet'?'warn':'dim'}">${engInfo.level || '--'}</span> ` +
    `倍率=<span class="val">${engInfo.multiplier || '--'}</span> ` +
    `速率=<span class="dim">${engInfo.base_rate || '--'}</span>`;

  document.getElementById('state-scheduler').innerHTML =
    `<h3>🎭 Persona (人格特质)</h3>能量=<span class="val">${per.energy || '--'}</span> 心情=<span class="val">${per.mood || '--'}</span> ` +
    `动机=<span class="val">${per.motivation ?? '--'}</span> 接纳=<span class="${per.receptive ? 'val' : 'warn'}">${per.receptive ? '是' : '否'}</span>`;
}

// ── history sync (still uses REST) ──
async function syncConversationFromCore() {
  try {
    const resp = await fetch('/core/chat/history', {
      method: 'POST',
      headers: coreHeaders(),
      body: JSON.stringify({ user_id: CORE_USER_ID, contact_id: currentContact, limit: 500 }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const data = await resp.json();
    // Flatten persisted segments into per-bubble messages
    chatMessages = [];
    for (const m of (data.messages || [])) {
      const isPro = !!m.is_proactive;
      const segs = (m.role === 'assistant' && Array.isArray(m.segments) && m.segments.length)
        ? m.segments
        : [m.content];
      const audios = Array.isArray(m.audio_urls) ? m.audio_urls : [];
      for (let i = 0; i < segs.length; i++) {
        chatMessages.push({ role: m.role, content: segs[i], timestamp: Date.now(), isProactive: isPro, audio_url: audios[i] || null });
      }
    }
    userMemory = Object.assign({summary:'',timeline:[],facts:[],patterns:'',updated:0}, data.memory || {});
    renderMessages();
    document.getElementById('memory-display').textContent = memoryDisplayText();
    await refreshDebugState();
    log('info', `已同步历史: ${chatMessages.length} 条`);
  } catch (e) {
    log('error', `历史同步失败: ${e.message}`);
  }
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  for (const m of chatMessages) {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.isProactive ? 'proactive' : m.role);
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = m.content;
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = fmtTime(m.timestamp);
    if (m.audio_url) {
      const btn = document.createElement('button');
      btn.textContent = '🔊';
      btn.title = '播放语音';
      btn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:12px;margin-left:4px';
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        playAudio(m.audio_url);
      });
      meta.appendChild(btn);
    }
    bubble.appendChild(meta);
    div.appendChild(bubble);
    container.appendChild(div);
  }
  container.scrollTop = container.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════
// LIVE MODE — WebSocket Connection
// ═══════════════════════════════════════════════════════════════

const LIVE = {
  ws: null,
  connected: false,
  replyId: null,
  typingTimer: null,

  connect() {
    const apiKey = document.getElementById('api-key').value.trim();
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = location.host;  // same host:port as the page (port 8000 via FastAPI static mount)
    const url = `${protocol}//${host}/live/${CORE_USER_ID}?contact_id=${encodeURIComponent(currentContact)}&api_key=${encodeURIComponent(apiKey)}&voice_mode=${getVoiceMode()}`;

    log('info', `🔌 连接 Live: ${url}`);
    this.ws = new WebSocket(url);

    this.ws.onopen = () => {
      log('info', '✅ WebSocket 已连接');
    };

    this.ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        this._onMessage(msg);
      } catch (err) {
        log('error', `WS 消息解析失败: ${err.message}`);
      }
    };

    this.ws.onclose = (e) => {
      this.connected = false;
      log('info', `🔌 WebSocket 断开 (code=${e.code}) — 5秒后重连`);
      showTypingIndicator(false);
      setTimeout(() => { if (!this.connected) this.connect(); }, 5000);
    };

    this.ws.onerror = (e) => {
      log('error', 'WebSocket 错误');
    };
  },

  _onMessage(msg) {
    switch (msg.type) {
      case 'live.connected':
        this.connected = true;
        log('info', `✅ Live session: ${msg.session_id}`);
        break;

      case 'reply.start':
        this.replyId = msg.reply_id;
        _ensureStreamBubble(msg.reply_id, msg.mode === 'proactive' ? 'proactive' : 'assistant');
        break;

      case 'reply.token':
        _appendToken(msg.reply_id, msg.token);
        break;

      case 'reply.end':
        _finalizeBubble(msg.reply_id, msg.full_text, msg.segments, msg.audio_urls);
        if (msg.memory) {
          userMemory = Object.assign({summary:'',timeline:[],facts:[],patterns:'',updated:0}, msg.memory);
          document.getElementById('memory-display').textContent = memoryDisplayText();
        }
        this.replyId = null;
        showTypingIndicator(false);
        refreshDebugState();
        break;

      case 'reply.audio':
        if (msg.audio_url) {
          playAudio(msg.audio_url);
        }
        break;

      case 'proactive.start':
        this.replyId = msg.reply_id;
        _ensureStreamBubble(msg.reply_id, 'proactive');
        log('event', `📨 主动消息: strategy=${msg.strategy} hint=${msg.topic_hint||'--'}`);
        break;

      case 'proactive.token':
        _appendToken(msg.reply_id, msg.token);
        break;

      case 'proactive.end':
        _finalizeBubble(msg.reply_id, msg.full_text, msg.segments, msg.audio_urls);
        this.replyId = null;
        showTypingIndicator(false);
        refreshDebugState();
        break;

      case 'companion.typing':
        showTypingIndicator(msg.active);
        break;

      case 'thinking.state':
        updateDebugFromThinking(msg);
        break;

      case 'thinking.decision':
        updateDebugFromDecision(msg);
        if (!msg.should_speak) {
          log('decision', `⏭ 跳过 — desire=${(msg.factors||{}).desire||'?'} strategy=${msg.strategy||'?'}`);
        }
        break;

      case 'thinking.skipped':
        log('decision', `⏭ 跳过 (${msg.reason||'?'}) — desire=${msg.desire||'?'} strategy=${msg.strategy||'?'}`);
        break;

      case 'error':
        log('error', `后端错误: ${msg.code} — ${msg.detail}`);
        showTypingIndicator(false);
        break;

      case 'pong':
        break;  // keepalive

      default:
        log('info', `未知消息类型: ${msg.type}`);
    }
  },

  send(type, payload = {}) {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify({ type, ...payload }));
    }
  },

  disconnect() {
    if (this.ws) {
      this.ws.close(1000, 'user disconnect');
      this.ws = null;
    }
    this.connected = false;
  },
};

// ── send message (normal or live) ──
async function send() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  lastActivity = Date.now();

  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { addMessage('assistant', '⚠️ 请先设置 DeepSeek API Key'); return; }

  addMessage('user', text);

  if (runtimeMode === 'live') {
    const mode = document.getElementById('mode-toggle').value;
    LIVE.send('user.message', { text, mode });
    LIVE.send('user.typing', { active: false });
  } else {
    await sendNormal(text, apiKey);
  }
}

async function sendNormal(text, apiKey) {
  showTypingIndicator(true);
  try {
    const resp = await fetch('/core/chat/reply', {
      method: 'POST',
      headers: coreHeaders(),
      body: JSON.stringify({
        user_id: CORE_USER_ID,
        contact_id: currentContact,
        message: text,
        update_memory: true,
        memory_update_async: true,
        context_window: 40,
        voice_mode: voiceEnabled,
      }),
    });
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${err}`);
    }
    const data = await resp.json();
    const reply = data.reply || '';
    const segments = (Array.isArray(data.reply_segments) && data.reply_segments.length)
      ? data.reply_segments
      : [reply];
    showTypingIndicator(false);
    for (let i = 0; i < segments.length; i++) {
      addMessage('assistant', segments[i]);
      if (i < segments.length - 1) {
        await new Promise(r => setTimeout(r, 450));  // natural stagger between bubbles
      }
    }
    if (data.memory) {
      userMemory = Object.assign({ summary: '', timeline: [], facts: [], patterns: '', updated: 0 }, data.memory);
      document.getElementById('memory-display').textContent = memoryDisplayText();
    }
    // Engagement debug
    if (data.engagement) {
      const e = data.engagement;
      log('info', `🎚 互动偏好: direction=${e.direction} multiplier=${e.multiplier||'?'} source=${e.source||'?'}${e.reason?' ('+e.reason+')':''}`);
    }

    // Auto-play all segments sequentially
    const urls = data.audio_urls || (data.audio_url ? [data.audio_url] : []);
    if (urls.length) {
      log('info', `📢 收到 ${urls.length} 段语音，顺序播放`);
      _playSequence(urls, 0);
    }
    await refreshDebugState();
    log('api', `回复完成 (${reply.length} chars)`);
  } catch (e) {
    log('error', `普通模式请求失败: ${e.message}`);
    addMessage('assistant', '⚠️ 请求失败，请查看调试日志');
  } finally {
    showTypingIndicator(false);
  }
}

// ── interaction mode toggle ──
document.getElementById('mode-toggle').addEventListener('change', async function() {
  const newMode = this.value;
  if (runtimeMode === 'live') {
    LIVE.send('user.mode', { mode: newMode });
  } else {
    // Normal mode: tell the core scheduler directly
    try {
      await fetch('/core/state/mode', {
        method: 'POST',
        headers: coreHeaders(),
        body: JSON.stringify({ user_id: CORE_USER_ID, contact_id: currentContact, mode: newMode }),
      });
    } catch (e) {
      log('error', `模式切换失败: ${e.message}`);
    }
    refreshDebugState();
  }
  log('event', `📡 切换 → ${newMode}`);
});

// ── voice mode toggle ──
document.getElementById('voice-mode-toggle').value = getVoiceMode();
document.getElementById('voice-mode-toggle').addEventListener('change', function() {
  saveVoiceMode(this.value);
  log('event', `🔊 语音模式 → ${voiceEnabled ? '开启' : '关闭'}`);
});

// ── runtime mode toggle ──
document.getElementById('runtime-mode').addEventListener('change', function() {
  runtimeMode = this.value;
  updateRuntimeHint();
  if (runtimeMode === 'live') {
    LIVE.connect();
    log('event', '🔌 切换到 Live 模式');
  } else {
    LIVE.disconnect();
    log('event', '⏹ 切换到普通模式');
  }
});

function updateRuntimeHint() {
  const hint = document.getElementById('runtime-hint');
  if (runtimeMode === 'live') {
    hint.textContent = 'Live 模式 — WebSocket 直连 port 8000';
  } else {
    hint.textContent = '普通模式 — HTTP /core/chat/reply';
  }
}

// ── typing indicator (debounced, live only) ──
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', () => {
  if (runtimeMode !== 'live') return;
  LIVE.send('user.typing', { active: true });
  clearTimeout(LIVE.typingTimer);
  LIVE.typingTimer = setTimeout(() => {
    LIVE.send('user.typing', { active: false });
  }, 2000);
});

// ── idle detection (live only) ──
window.addEventListener('blur', () => {
  if (runtimeMode !== 'live') return;
  LIVE.send('user.idle', { idle_ms: Date.now() - lastActivity });
});
window.addEventListener('focus', () => {
  lastActivity = Date.now();
  if (runtimeMode !== 'live') return;
  LIVE.send('user.idle', { idle_ms: 0 });
});
setInterval(() => {
  if (runtimeMode === 'live' && LIVE.connected) {
    LIVE.send('user.idle', { idle_ms: Date.now() - lastActivity });
  }
}, 30000);

// ── ping keepalive (live only) ──
setInterval(() => {
  if (runtimeMode === 'live' && LIVE.connected) LIVE.send('ping');
}, 45000);

// ── periodic debug refresh (normal mode: keeps idle/desire/attention moving) ──
setInterval(() => {
  if (runtimeMode !== 'live') refreshDebugState();
}, 15000);

// ── API key ──
function saveApiKey() {
  const k = document.getElementById('api-key').value.trim();
  localStorage.setItem('ds_api_key', k);
  log('info', 'API Key 已保存');
}

// ── contact switch ──
document.getElementById('contact-select').onchange = async function() {
  const newContact = this.value;
  if (runtimeMode === 'live') LIVE.disconnect();
  currentContact = newContact;
  chatMessages = [];
  lastHistoryCount = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('memory-display').textContent = '(暂无记忆)';
  await syncConversationFromCore();
  if (runtimeMode === 'live') LIVE.connect();
  log('info', `切换到联系人: ${newContact}`);
};

// ── init ──
const savedKey = localStorage.getItem('ds_api_key');
if (savedKey) document.getElementById('api-key').value = savedKey;

runtimeMode = document.getElementById('runtime-mode').value;
updateRuntimeHint();

syncConversationFromCore().then(() => {
  if (runtimeMode === 'live') LIVE.connect();
});

log('info', '🚀 Companion Web Shell ready');
log('info', '运行: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000');
log('info', '浏览器打开 http://localhost:8000');
log('info', `当前运行模式: ${runtimeMode === 'live' ? 'Live' : '普通'} — 可通过顶部下拉切换`);
</script>
